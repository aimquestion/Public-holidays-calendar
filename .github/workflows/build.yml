name: Build calendars

on:
  schedule:
    - cron: "0 18 * * 1"      # Mondays 18:00 UTC (~Tue morning AEST)
  workflow_dispatch: {}         # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - "src/**"
      - "data/seed/**"
      - "requirements.txt"
      - ".github/workflows/build.yml"

permissions:
  contents: write               # allow committing regenerated .ics files

concurrency:
  group: build-calendars
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build calendars
        run: python -m src.build

      - name: DIAG school sources (temporary)
        run: |
          python - <<'PY'
          import requests
          from bs4 import BeautifulSoup
          from src.school import act, nt, sa, wa, base
          for mod in (act, nt, sa, wa):
              url = mod.SOURCE_URL
              print("=" * 70)
              print(mod.__name__, url)
              try:
                  r = requests.get(url, headers=base._HEADERS, timeout=30)
                  print("status", r.status_code, "| ctype", r.headers.get("content-type"), "| len", len(r.content))
                  soup = BeautifulSoup(r.content, "lxml")
                  tables = soup.find_all("table")
                  print("tables:", len(tables))
                  for i, t in enumerate(tables[:8]):
                      cap = t.find("caption")
                      rows = t.find_all("tr")
                      print(f"  table[{i}] caption={cap.get_text(' ', strip=True) if cap else None} rows={len(rows)}")
                      for tr in rows[:4]:
                          cells = [c.get_text(' ', strip=True) for c in tr.find_all(['td', 'th'])]
                          print("      ", cells)
              except Exception as e:
                  print("ERR", repr(e))
          PY

      - name: Surface degraded sources
        run: |
          python - <<'PY'
          import json, sys
          s = json.load(open("docs/status.json"))
          bad = [st for st, i in s.get("school", {}).items()
                 if i.get("source") in ("seed", "none")]
          if bad:
              print(f"::warning title=School source degraded::"
                    f"No live/cache data for: {', '.join(sorted(bad))}. "
                    f"Check scrapers or add data/seed/<state>.csv.")
          PY

      - name: Commit updated calendars
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/cache/
          if git diff --cached --quiet; then
            echo "No calendar changes."
          else
            git commit -m "chore: refresh calendars [skip ci]"
            git push
          fi
