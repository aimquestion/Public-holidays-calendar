name: Build calendars

on:
  schedule:
    - cron: "0 18 * * 1"      # Mondays 18:00 UTC (~Tue morning AEST)
  workflow_dispatch: {}         # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - "src/**"
      - "data/seed/**"
      - "requirements.txt"
      - ".github/workflows/build.yml"

permissions:
  contents: write               # allow committing regenerated .ics files

concurrency:
  group: build-calendars
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build calendars
        run: python -m src.build

      - name: DIAG probe alternative sources (temporary)
        run: |
          python - <<'PY'
          import requests
          from bs4 import BeautifulSoup
          UA = {"User-Agent": ("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 "
                               "(KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"),
                "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
                "Accept-Language": "en-AU,en;q=0.9"}
          cands = {
            "newywithkids-SA":  "https://newywithkids.com.au/south-australia-school-term-dates-public-holidays/",
            "saschoolhols-2027":"https://saschoolholidays.com.au/sa-school-holidays-2027/",
            "payly-SA-2026":    "https://www.payly.com.au/calendars/sa-school-holidays-2026",
            "payly-SA-2027":    "https://www.payly.com.au/calendars/sa-school-holidays-2027",
            "payly-NT-2026":    "https://www.payly.com.au/calendars/nt-school-holidays-2026",
            "payly-ACT-2026":   "https://www.payly.com.au/calendars/act-school-holidays-2026",
          }
          for name, url in cands.items():
              print("=" * 72)
              print(name, url)
              try:
                  r = requests.get(url, headers=UA, timeout=30)
                  soup = BeautifulSoup(r.content, "lxml")
                  tables = soup.find_all("table")
                  txt = soup.get_text(" ", strip=True).lower()
                  markers = [k for k in ("term 1", "term 4", "2026", "2027", "holiday") if k in txt]
                  print("status", r.status_code, "| ctype", r.headers.get("content-type"),
                        "| len", len(r.content), "| tables", len(tables), "| markers", markers)
                  for i, t in enumerate(tables[:3]):
                      rows = t.find_all("tr")
                      print(f"  table[{i}] rows={len(rows)}")
                      for tr in rows[:6]:
                          cells = [c.get_text(' ', strip=True) for c in tr.find_all(['td', 'th'])]
                          if cells:
                              print("    ", cells)
              except Exception as e:
                  print("ERR", repr(e))
          PY

      - name: Surface degraded sources
        run: |
          python - <<'PY'
          import json, sys
          s = json.load(open("docs/status.json"))
          bad = [st for st, i in s.get("school", {}).items()
                 if i.get("source") in ("seed", "none")]
          if bad:
              print(f"::warning title=School source degraded::"
                    f"No live/cache data for: {', '.join(sorted(bad))}. "
                    f"Check scrapers or add data/seed/<state>.csv.")
          PY

      - name: Commit updated calendars
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/cache/
          if git diff --cached --quiet; then
            echo "No calendar changes."
          else
            git commit -m "chore: refresh calendars [skip ci]"
            git push
          fi
