name: Build calendars

on:
  schedule:
    - cron: "0 18 * * 1"      # Mondays 18:00 UTC (~Tue morning AEST)
  workflow_dispatch: {}         # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - "src/**"
      - "data/seed/**"
      - "requirements.txt"
      - ".github/workflows/build.yml"

permissions:
  contents: write               # allow committing regenerated .ics files

concurrency:
  group: build-calendars
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build calendars
        run: python -m src.build

      - name: DIAG WA year structure (temporary)
        run: |
          python - <<'PY'
          import re
          import requests
          from bs4 import BeautifulSoup
          from src.school import wa, base
          r = requests.get(wa.SOURCE_URL, headers=base._HEADERS, timeout=30)
          soup = BeautifulSoup(r.content, "lxml")
          print("=== headings containing a year ===")
          for tag in soup.find_all(re.compile(r"^h[1-6]$")):
              txt = tag.get_text(" ", strip=True)
              if re.search(r"20\d\d", txt):
                  print("HEADING", tag.name, repr(txt[:60]))
          print("=== any element whose text is exactly a year ===")
          for tag in soup.find_all(string=re.compile(r"^\s*20\d\d\s*$")):
              parent = tag.parent
              print("YEARNODE", parent.name, repr(tag.strip()), "| gp:", parent.parent.name if parent.parent else None)
          tables = soup.find_all("table")
          print("num tables", len(tables))
          for idx in (0, 2):
              t = tables[idx]
              print(f"--- table[{idx}] nearest preceding headings ---")
              node = t
              for _ in range(6):
                  node = node.find_previous(re.compile(r"^h[1-6]$"))
                  if node is None:
                      break
                  print("   prev", node.name, repr(node.get_text(" ", strip=True)[:60]))
          PY

      - name: Surface degraded sources
        run: |
          python - <<'PY'
          import json, sys
          s = json.load(open("docs/status.json"))
          bad = [st for st, i in s.get("school", {}).items()
                 if i.get("source") in ("seed", "none")]
          if bad:
              print(f"::warning title=School source degraded::"
                    f"No live/cache data for: {', '.join(sorted(bad))}. "
                    f"Check scrapers or add data/seed/<state>.csv.")
          PY

      - name: Commit updated calendars
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/cache/
          if git diff --cached --quiet; then
            echo "No calendar changes."
          else
            git commit -m "chore: refresh calendars [skip ci]"
            git push
          fi
